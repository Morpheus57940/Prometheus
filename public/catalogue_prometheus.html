<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Prometheus Catalogue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#07090f;color:#e8edf5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hd{background:#0d1117;border-bottom:1px solid rgba(255,255,255,.07);padding:8px 12px;flex-shrink:0}
#top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#logo{width:26px;height:26px;background:linear-gradient(135deg,#e8912a,#f7b84b);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
#title{font-size:12px;font-weight:700}
#sub{font-size:9px;color:#6b7a94}
#counts{margin-left:auto;display:flex;gap:10px;text-align:center}
.cn{font-size:14px;font-weight:700;color:#e8912a;line-height:1}
.cl{font-size:8px;color:#6b7a94;text-transform:uppercase}
#si{width:100%;padding:8px 10px 8px 34px;background:#131a24;border:1px solid rgba(255,255,255,.07);border-radius:8px;color:#e8edf5;font-size:15px;outline:none;margin-bottom:7px}
#si:focus{border-color:#e8912a}
#sw{position:relative}
#sx{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7a94;font-size:13px}
#fi{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:2px}
#fi::-webkit-scrollbar{display:none}
.fb{padding:4px 9px;border-radius:12px;font-size:10px;border:1px solid rgba(255,255,255,.07);background:transparent;color:#6b7a94;cursor:pointer;white-space:nowrap}
.fb.on{color:#fff;border-color:transparent;background:#e8912a}
#sb{display:flex;align-items:center;gap:5px;padding:5px 12px;background:#0d1117;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.ss{font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.07);background:transparent;color:#6b7a94;cursor:pointer}
.ss.on{border-color:#e8912a;color:#e8912a}
#rc{margin-left:auto;font-size:10px;color:#6b7a94}
#lst{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.row:active{background:#131a24}
.ico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp{font-size:10px;color:#6b7a94;margin-bottom:3px}
.chips{display:flex;gap:3px;flex-wrap:wrap}
.chip{font-size:9px;padding:1px 5px;border-radius:6px;font-family:monospace}
.cm{background:rgba(96,165,250,.12);color:#60a5fa}
.ck{background:rgba(232,145,42,.12);color:#e8912a}
.ci{background:rgba(29,184,119,.1);color:#1db877}
.rf{margin-left:auto;text-align:right;flex-shrink:0;min-width:50px}
.rp{font-size:9px;color:#f7b84b;font-family:monospace}
.rc2{font-size:9px;color:#6b7a94}
.sep{padding:3px 12px;font-size:9px;font-weight:700;color:#e8912a;background:rgba(232,145,42,.04);border-bottom:1px solid rgba(255,255,255,.05);letter-spacing:1px}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;justify-content:center;z-index:99}
#mo.v{display:flex}
#mc{background:#0d1117;border-radius:16px 16px 0 0;border:1px solid rgba(255,255,255,.07);border-bottom:none;width:100%;max-width:580px;max-height:85vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0)}
#mh{width:32px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:10px auto 0}
#mb{padding:12px 15px 18px}
#mico{font-size:22px;margin-bottom:4px}
#mnom{font-size:18px;font-weight:700;margin-bottom:2px}
#msub{font-size:11px;color:#6b7a94;margin-bottom:12px}
#mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.mc{background:#131a24;border-radius:7px;padding:8px 10px}
.ml{font-size:9px;color:#6b7a94;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mv{font-size:12px;font-weight:600;font-family:monospace}
.mva{color:#e8912a}.mvg{color:#1db877}
#mnot{background:#131a24;border-radius:7px;padding:10px;font-size:12px;line-height:1.6;margin-bottom:10px}
#mclose{width:100%;padding:10px;border-radius:8px;background:#131a24;border:1px solid rgba(255,255,255,.07);color:#6b7a94;font-size:14px;cursor:pointer}
mark{background:rgba(232,145,42,.3);color:#f7b84b;border-radius:2px}
</style>
</head>

  else if(CF==='automne')d=d.filter(function(r){return r[8].indexOf('utomne')>-1;});
  else if(CF==='hiver')d=d.filter(function(r){return r[8].indexOf('iver')>-1;});
  else if(CF==='facile')d=d.filter(function(r){return r[7]==='Facile';});
  else if(CF==='difficile')d=d.filter(function(r){return r[7]==='Difficile'||r[7]==='Tres difficile';});
  if(CQ){d=d.filter(function(r){return r[0].toLowerCase().indexOf(CQ)>-1||r[1].toLowerCase().indexOf(CQ)>-1||r[2].toLowerCase().indexOf(CQ)>-1||r[8].toLowerCase().indexOf(CQ)>-1;});}
  if(CS===0)d.sort(function(a,b){return a[0].localeCompare(b[0]);});
  else if(CS===4)d.sort(function(a,b){return (parseFloat(a[4])||99)-(parseFloat(b[4])||99);});
  else if(CS===9)d.sort(function(a,b){return (parseInt(b[9])||0)-(parseInt(a[9])||0);});
  return d;
}
function render(){
  FD=gFD();
  document.getElementById('rc').textContent=FD.length+' objets';
  document.getElementById('vc').textContent=FD.length;
  var h=[],lL='';
  for(var i=0;i<FD.length;i++){
    var r=FD[i];
    var col=CC[r[3]]||'#6b7a94';
    if(CS===0&&!CQ){var L=r[0][0].toUpperCase();if(L!==lL){h.push('<div class="sep">'+L+'</div>');lL=L;}}
    var nb=r[9]?'<span class="chip ck">'+r[9]+' poses</span>':'';
    var ig=r[10]?'<span class="chip ci">'+r[10]+'</span>':'';
    var mg=r[4]?'<span class="chip cm">mag '+r[4]+'</span>':'';
    h.push('<div class="row" onclick="showD('+i+')"><div class="ico" style="background:'+col+'18;border:1px solid '+col+'30">'+r[11]+'</div><div style="flex:1;min-width:0"><div class="nm">'+hl(r[0])+'</div><div class="tp">'+hl(r[2])+'</div><div class="chips">'+mg+nb+ig+'</div></div><div class="rf"><div class="rp">'+r[5]+'</div><div class="rc2">'+hl(r[1])+'</div></div></div>');
  }
  document.getElementById('lst').innerHTML=h.join('');
}
function showD(i){
  var r=FD[i];
  var col=CC[r[3]]||'#6b7a94';
  document.getElementById('mico').textContent=r[11];
  document.getElementById('mnom').textContent=r[0];
  document.getElementById('msub').textContent=r[2]+' · '+r[1];
  document.getElementById('mmag').textContent=r[4]?'mag '+r[4]:'—';
  document.getElementById('mdif').textContent=r[7]||'—';
  document.getElementById('msai').textContent=r[8]||'—';
  document.getElementById('mpos').textContent=r[5]||'—';
  document.getElementById('miso').textContent=r[6]?'ISO '+r[6]:'—';
  document.getElementById('mnb').textContent=r[9]?r[9]+' poses':'—';
  document.getElementById('mig').textContent=r[10]||'—';
  document.getElementById('mcon').textContent=r[1]||'—';
  document.getElementById('mnot').textContent=gN(r);
  document.getElementById('mo').classList.add('v');
}
function closeM(){document.getElementById('mo').classList.remove('v');}
document.getElementById('tc').textContent=D.length;
render();
</script>
